name: Auto deploy - preview

on:
  push:
    branches:
      - vue-port
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Install Wrangler
        run: npm install -g wrangler

      # Vite bundles use inline `template:` strings; production build needs the Vue
      # compiler (vite.config.js alias). Until that deploy is verified on preview, ship
      # the unbundled import-map entry below (same as local dev).
      # - name: Install dependencies and build Vue bundles
      #   run: |
      #     npm ci
      #     npm run build:deploy

      - name: Generate deployment info
        run: |
          echo '{
            "deployedAt": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "commit": "'${{ github.sha }}'",
            "branch": "'${{ github.ref_name }}'",
            "actor": "'${{ github.actor }}'"
          }' > deploy-info.json

      - name: Prune non-production files before deploy
        run: |
          set -eux
          # Test pages and the Cordova mobile wrapper are not served in production
          rm -rf s/content-test
          rm -rf s/cordova
          # Soundfont conversion tooling + raw samples (~8MB), never fetched at runtime
          rm -rf s/js/thirdparty/soundfont/NewDrumSamples
          # acoustic_grand_piano soundfonts are unused; only "gunshot" is loaded
          rm -f s/js/thirdparty/soundfont/acoustic_grand_piano-mp3.js
          rm -f s/js/thirdparty/soundfont/acoustic_grand_piano-ogg.js
          # We force targetFormat: "mp3" at load time, so the ogg soundfonts are never requested
          rm -f s/js/thirdparty/soundfont/gunshot-ogg.js
          # Editor/OS cruft
          find . -name ".DS_Store" -delete

      - name: Authenticate with Cloudflare
        run: |
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV
        
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=beatnation --branch preview
